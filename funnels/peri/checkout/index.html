<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Perimenopause Performance System — Checkout</title>
    <meta name="robots" content="noindex,nofollow">
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            min-height: 100%;
            background: #ffffff;
            overflow-x: hidden;
            -webkit-text-size-adjust: 100%;
            text-size-adjust: 100%;
        }

        body {
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #111827;
        }

        #checkout-page {
            width: 100%;
            min-height: 100vh;
            overflow: visible;
            overflow-anchor: none;
        }

        /* Keeps the page neutral and fast; Digistore renders the checkout UI */
        #checkout-page,
        #checkout-page * {
            box-sizing: border-box;
        }
    </style>
</head>
<body>
    <main id="checkout-page">
        <!-- Begin of digistore multi-step order box code -->
        <script src="https://www.checkout-ds24.com/service/digistore.js"></script>
        <my-order-form product-id="692610" order-form-id="242231" base-url="https://www.checkout-ds24.com"></my-order-form>
        <!-- End of digistore multi-step order box code -->
    </main>
</body>
</html>
